[env:esp32dev]
; ESP32 development board target.
platform = espressif32

; Generic ESP32 Dev Module.
board = esp32dev

; Arduino framework for Wi-Fi, web server, and IR control.
framework = arduino

; IR library used for sending and decoding Gree remote commands.
; MQTT library for cloud connectivity.
lib_deps =
  crankyoldgit/IRremoteESP8266 @ ^2.8.6
  knolleary/PubSubClient @ ^2.8.0

; Serial Monitor baud rate.
monitor_speed = 115200
